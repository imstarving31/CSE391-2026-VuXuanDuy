    <!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>E-Commerce Grid Layout</title>
    <link rel="stylesheet" href="grid.css">
</head>
<body>
    <div class="grid-container">
        <header class="header">HEADER (full width)</header>

        <section class="hero">
            <div class="hero-banner-content">HERO BANNER</div>
            <div class="featured-card">Card Product Nổi Bật (span 2)</div>
        </section>

        <aside class="sidebar">
            <h3>SIDEBAR (filter)</h3>
            <br>
            <label><input type="checkbox"> Điện thoại</label><br>
            <label><input type="checkbox"> Laptop</label><br>
            <label><input type="checkbox"> Phụ kiện</label>
        </aside>

        <main class="main-content">
            <div class="card">Card 1</div>
            <div class="card">Card 2</div>
            <div class="card">Card 3</div>
            <div class="card">Card 4</div>
            <div class="card">Card 5</div>
            <div class="card">Card 6</div>
        </main>

        <aside class="ads">
            <h3>ADS (aside)</h3>
            <br>
            <img src="https://via.placeholder.com/150x250?text=Banner+Ads" alt="Quảng cáo" style="max-width: 100%;">
        </aside>

        <footer class="footer">FOOTER (full width)</footer>
    </div>
</body>
</html>
</body>
</html>

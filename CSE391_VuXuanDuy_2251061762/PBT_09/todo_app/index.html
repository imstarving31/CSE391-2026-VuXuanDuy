<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Todo App</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <main class="todo-app">
        <h1>Todo App</h1>
        <form id="todoForm">
            <input id="todoInput" type="text" placeholder="Bạn cần làm gì?" autocomplete="off">
            <button type="submit">Thêm</button>
        </form>

        <ul id="todoList" aria-live="polite"></ul>

        <footer>
            <span id="itemsLeft">0 items left</span>
            <div class="filters" aria-label="Lọc công việc">
                <button class="filter active" type="button" data-filter="all">All</button>
                <button class="filter" type="button" data-filter="active">Active</button>
                <button class="filter" type="button" data-filter="completed">Completed</button>
            </div>
            <button id="clearCompleted" type="button">Clear completed</button>
        </footer>
    </main>
    <script src="app.js"></script>
</body>
</html>

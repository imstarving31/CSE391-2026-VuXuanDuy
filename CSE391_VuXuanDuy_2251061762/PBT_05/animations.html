<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CSS Transitions & Animations</title>
    <link rel="stylesheet" href="animations.css">
</head>
<body>

    <div class="container">
        
        <h2 class="fade-in-title">Môi trường Test Animation</h2>

        <div class="card fade-in-element">
            <div class="img-container">
                <img src="https://placehold.co/300x200" alt="Sản phẩm">
            </div>
            
            <div class="card-content">
                <h3>Giày thể thao X</h3>
                <p>Mô tả ngắn gọn về sản phẩm.</p>
                <button class="btn">Mua ngay</button>
            </div>
        </div>

        <div class="spinner-container fade-in-element">
            <p>Đang tải dữ liệu...</p>
            <div class="spinner"></div>
        </div>

    </div>

</body>
</html>
